# Web Server Configuration
server.port=8080
server.servlet.context-path=/pms/v1

# ===================================================================
# Active Database Profile: H2 (Default for instant zero-setup local dev)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:cybercoredb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Jackson Configuration
# The frontend expects snake_case JSON fields (full_name, due_date,
# created_at, etc.). Entities/DTOs are written in camelCase, so we
# convert automatically instead of annotating every single field.
# Explicit @JsonProperty overrides on DTOs still take precedence.
# ===================================================================
spring.jackson.property-naming-strategy=SNAKE_CASE

# ===================================================================
# PostgreSQL Configuration (Uncomment & configure to use PostgreSQL)
# ===================================================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/cybercoredb
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
