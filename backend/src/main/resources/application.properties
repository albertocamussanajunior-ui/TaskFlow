# ===================================================================
# Security & JWT Configuration
# ===================================================================
app.jwt.secret=this-is-a-very-long-secret-key-that-satisfies-hmac-sha-256-requirements-and-is-secure-cyber-core-2026
app.jwt.expiration-ms=86400000
